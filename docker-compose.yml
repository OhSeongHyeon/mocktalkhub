name: mocktalk-dev

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    container_name: mocktalk-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - mocktalk_pgdata:/var/lib/postgresql/data

  # Redis 캐시/세션/실시간 보조 저장소
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: mocktalk-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c '
      if [ -n "$${REDIS_PASSWORD}" ]; then
        redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}";
      else
        redis-server --appendonly yes;
      fi'
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG; else redis-cli ping | grep PONG; fi"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - mocktalk_redis_data:/data

  # MinIO 오브젝트 스토리지 서버(실제 파일 데이터 저장)
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    container_name: mocktalk-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - mocktalk_minio_data:/data

  # MinIO 초기화 컨테이너(버킷 생성 등 1회성 준비 작업)
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: mocktalk-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done &&
      mc mb --ignore-existing local/$${MINIO_BUCKET:-mocktalk}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-mocktalk}

  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: mocktalk-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./backend/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/monitoring/prometheus/targets:/etc/prometheus/targets:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:12.3.2-security-01
    container_name: mocktalk-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mocktalk-back
    env_file:
      - ./.env.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${SERVER_PORT:-8082}:8082"
      - "${MANAGEMENT_PORT:-8083}:8083"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mocktalk-front
    env_file:
      - ./.env.dev
    environment:
      PORT: ${FRONTEND_PORT:-80}
      BACKEND_BASE_URL: http://backend:8082
      OBJECT_STORAGE_BASE_URL: ${OBJECT_STORAGE_BASE_URL:-http://minio:9000}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_HOST_PORT:-8081}:${FRONTEND_PORT:-80}"
    restart: unless-stopped

volumes:
  mocktalk_pgdata:
  mocktalk_redis_data:
  mocktalk_minio_data:
  prometheus-data:
  grafana-data:
